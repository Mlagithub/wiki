  color: #f8f9fa;
}
.title-dark .tc-title {
  color: #343a40;
}
.title-white .tc-title {
  color: #fff;
}/* These css rules makes page control buttons in beatiful color */

/*page control buttons*/
.tc-page-controls .tc-image-new-button { fill: #5EB95E; } /*New tiddler button*/
.tc-page-controls .tc-image-options-button { fill:#8058A5; } /*Open control pannel*/

/* These css rules makes tiddler viewtoolbar buttons in beatiful color */

.tc-tiddler-controls .tc-image-edit-button{fill:#f37b1d}
.tc-tiddler-controls .tc-image-info-button{fill:#0e90d2}/*  drag and drop elements */
.kk-todolist-placeholder { 
	position:relative; 
	height:0; 	
	border:0 !important; 
	border-bottom:1px dotted grey !important; 
}

.kk-todolist-draggable-list .tc-draggable  { cursor: default !important; }
/* Todolist main ui dynamic props which follow palette colors*/.kk-todolist-ui svg{
	fill:#aaaaaa;
}.kk-todolist-ui button:hover svg {
	fill: #888888; 
}.kk-todolist-row:hover {
	/* background-color: #f6f6f6;*/
	background-color: #f0f0f0;
}.kk-todolist-row .kk-todolist-delete {
	opacity: 0.3;
}.kk-todolist-row:hover .kk-todolist-delete {
	opacity: 1;
}
/* Todolist main ui */
.kk-todolist-ui{
	min-width:320px; /* controls the minimum width of whole ui */
}


/* Todolist header ui */

.kk-todolist-header-ui{
	display: flex;
	width: 100%;
}
.kk-todolist-header-ui > div{
	margin: 2px;
	flex-grow:0;	
}
.kk-todolist-header-ui .kk-todolist-header-textbox{
	flex-grow:1;	
}

/* Todolist items ui */
.kk-todolist-row{
	display: flex;	
	width: 100%; /* for larg screen width> 960px*/
	flex-wrap: nowrap;
}

.kk-todolist-row .kk-todolist-done,
.kk-todolist-row .kk-todolist-priority,
.kk-todolist-row .kk-todolist-delete {
	flex-grow:0; width:15px;
}

.kk-todolist-row .kk-todolist-desc{
	flex-grow:1; 
	width: calc(100% - 50px); 
	padding-left: 10px;
	padding-right: 10px;
}

.kk-todolist-row .kk-todolist-priority{
	margin-right:5px;
}

/* for interstitial-journal timestamp */
.kk-todolist-row .kk-todolist-time{
	font-weight:bold;
	flex-grow:0;
	width:3.2em;
}

/* add mounth and day into interstitial */
.kk-todolist-time-one{
	font-weight:bold;
	flex-grow:0;
	width:8em;
}/* completed item */

.kk-todolist-item-done {
	text-decoration: red line-through;
	font-style: italic;
}

/* inputbox for add-task */
.kk-todolist-input-textbox {
	width:100%;
	padding-left: 5px;
	border: none;
	border-bottom: 1px dotted grey;
}

.kk-todolist-input-textbox:focus {
	outline: none;
	border-bottom: 1px solid #5778d8;
	background: transparent;
}

/* item timestamp */
.kk-todolist-date {
	font-size:0.8em;
	color:#c0c0c0;
}

/* Item categories */
.kk-todolist-category-c1,
.kk-todolist-category-c2 {
	padding-right:3px;
}

.kk-todolist-category-c1 svg, 
.kk-todolist-category-c2 svg  {
	opacity:0.70;
	vertical-align: middle;
	width: 1em;
	height: 1em;
}

.kk-todolist-category-c1 svg{
	fill:#8B0000;
}

.kk-todolist-category-c2 svg{
	fill:#006400;
}/* trashbin main ui */
.kk-trashbin-ui{
	min-width:320px; /* controls the minimum width of whole ui */
}.kk-trahbin-ui svg{
    fill:#aaaaaa;
}.kk-trahbin-ui .kk-trahbin-ui-controls svg{
 width:1.2em;
 height:1.2em;	
}/* trashbin items list ui */
.kk-trashbin-row{
	display: flex;	
	width: 95%;
	flex-wrap: wrap;
}.kk-trashbin-row .kk-trashbin-delete,
.kk-trashbin-row .kk-trashbin-restore {
	flex-grow:0; width:20px;
	margin-left:5px;
}.kk-trashbin-row .kk-trashbin-link{
	flex-grow:1; 
	width: calc(100% - 50px); 
	padding-right: 10px;
}/* old:  .kk-trashbin-row:hover { background-color: #f6f6f6; } */
.kk-trashbin-row:hover { background-color: #f5f5f5; }/* UI button fade-in*/
.kk-trahbin-ui   button:hover svg         { fill: #000000; }
.kk-trahbin-ui  .kk-trashbin-ui-btn       { opacity:0.5; }
.kk-trahbin-ui  .kk-trashbin-ui-btn:hover { opacity:1.0; }/* set style for trashed tiddlers */
